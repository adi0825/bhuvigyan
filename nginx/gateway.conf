# ================================================================
# Bhuvigyan — API Gateway (Nginx)
# Reverse proxies all Spring microservices under port 8080.
# Angular apps hit http://localhost:8080/api/v1/...
# ================================================================

upstream farmer_svc    { server farmer-service:8081; }
upstream admin_svc     { server admin-service:8082; }
upstream claims_svc    { server claims-service:8083; }
upstream location_svc  { server location-service:8084; }
upstream land_api_svc  { server land-api-service:8085; }
upstream kyc_svc       { server kyc-service:8086; }
upstream notif_svc     { server notification-service:8087; }
upstream cce_svc       { server cce-service:8088; }
upstream report_svc    { server report-service:8089; }
upstream carbon_svc    { server carbon-service:8090; }
upstream analytics_svc { server analytics-service:8091; }
upstream insurer_svc   { server insurer-service:8092; }

server {
    listen 8080;
    server_name _;

    # ── Health check for docker healthcheck ──────────────────
    location = /health {
        return 200 '{"status":"up"}';
        add_header Content-Type application/json;
    }

    # ── Auth ─────────────────────────────────────────────────
    location /api/v1/auth {
        proxy_pass http://farmer_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Farmer ───────────────────────────────────────────────
    location /api/v1/farmer {
        proxy_pass http://farmer_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Locations (states, districts, taluks, hoblis, villages) ──
    location /api/v1/locations {
        proxy_pass http://location_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Claims pipeline ──────────────────────────────────────
    location /api/v1/claims {
        proxy_pass http://claims_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Notifications ────────────────────────────────────────
    location /api/v1/notifications {
        proxy_pass http://notif_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── KYC / Aadhaar ────────────────────────────────────────
    location /api/v1/kyc {
        proxy_pass http://kyc_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Admin ────────────────────────────────────────────────
    location /api/v1/admin {
        proxy_pass http://admin_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Reports / MinIO presigned URLs ───────────────────────
    location /api/v1/reports {
        proxy_pass http://report_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── CCE ──────────────────────────────────────────────────
    location /api/v1/cce {
        proxy_pass http://cce_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Carbon ───────────────────────────────────────────────
    location /api/v1/carbon {
        proxy_pass http://carbon_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Analytics ────────────────────────────────────────────
    location /api/v1/analytics {
        proxy_pass http://analytics_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── Insurer ──────────────────────────────────────────────
    location /api/v1/insurer {
        proxy_pass http://insurer_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── WebSocket (STOMP) for admin live feed ────────────────
    location /ws {
        proxy_pass http://admin_svc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Dev endpoint (toggle GEE etc) ────────────────────────
    location /api/v1/dev {
        proxy_pass http://claims_svc;
        include /etc/nginx/conf.d/proxy_headers.inc;
    }

    # ── CORS headers for Angular at 4200-4204 ────────────────
    add_header 'Access-Control-Allow-Origin'      $http_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Access-Control-Allow-Methods'     'GET,POST,PUT,DELETE,OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,X-Requested-With' always;

    # Handle CORS preflight
    location = /options-preflight {
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
