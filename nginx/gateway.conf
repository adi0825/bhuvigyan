# ================================================================
# Bhuvigyan — API Gateway (Nginx)
# Routes to Spring Boot services on localhost for local development
# ================================================================

upstream farmer-service {
    server localhost:8081;
}

upstream admin-service {
    server localhost:8082;
}

upstream claims-service {
    server localhost:8083;
}

upstream location-service {
    server localhost:8084;
}

upstream kyc-service {
    server localhost:8086;
}

upstream notification-service {
    server localhost:8087;
}

upstream cce-service {
    server localhost:8088;
}

upstream report-service {
    server localhost:8089;
}

upstream carbon-service {
    server localhost:8090;
}

upstream analytics-service {
    server localhost:8091;
}

upstream insurer-service {
    server localhost:8092;
}

upstream csc-service {
    server localhost:8094;
}

upstream officer-service {
    server localhost:8095;
}

upstream state-service {
    server localhost:8096;
}

upstream ml-service {
    server localhost:8000;
}

server {
    listen 8080;
    server_name _;

    # Health check
    location = /health {
        return 200 '{"status":"up"}';
        add_header Content-Type application/json;
    }

    # Farmer service
    location /api/v1/farmer/ {
        proxy_pass http://farmer-service/api/v1/farmer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
    }

    # Admin service
    location /api/v1/admin/ {
        proxy_pass http://admin-service/api/v1/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
    }

    # Claims service
    location /api/v1/claims/ {
        proxy_pass http://claims-service/api/v1/claims/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
    }

    # Location service
    location /api/v1/location/ {
        proxy_pass http://location-service/api/v1/location/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # KYC service
    location /api/v1/kyc/ {
        proxy_pass http://kyc-service/api/v1/kyc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification service
    location /api/v1/notifications {
        proxy_pass http://notification-service/api/v1/notifications;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # State router (CCE service)
    location /api/v1/state-router/ {
        proxy_pass http://cce-service/api/v1/state-router/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Report service
    location /api/v1/reports/ {
        proxy_pass http://report-service/api/v1/reports/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Carbon service
    location /api/v1/carbon/ {
        proxy_pass http://carbon-service/api/v1/carbon/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Analytics service
    location /api/v1/analytics/ {
        proxy_pass http://analytics-service/api/v1/analytics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Insurer service
    location /api/v1/insurer/ {
        proxy_pass http://insurer-service/api/v1/insurer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CSC service
    location /api/v1/csc/ {
        proxy_pass http://csc-service/api/v1/csc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Officer service
    location /api/v1/officer/ {
        proxy_pass http://officer-service/api/v1/officer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # State service
    location /api/v1/state/ {
        proxy_pass http://state-service/api/v1/state/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ML service (satellite)
    location /satellite/ {
        proxy_pass http://ml-service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root
    location / {
        return 200 '{"status":"Bhuvigyan Gateway","version":"1.0"}';
        add_header Content-Type application/json;
    }
}
