name: Bhuvigyan V7 — Full Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+asyncpg://bhuvigyan:bhuvigyan123@localhost:5432/bhuvigyan_test
  REDIS_URL: redis://localhost:6379/0
  KAFKA_BROKER: localhost:9092

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Python deps
        run: pip install ruff black mypy
      - name: Lint backend
        run: cd bhuvigyan-backend && ruff check . && black --check .
      - name: Typecheck backend
        run: cd bhuvigyan-backend && mypy app/
      - name: Lint frontend
        run: cd frontend/bhuvigyan-ui && npm ci && npm run lint
      - name: Typecheck frontend
        run: cd frontend/bhuvigyan-ui && npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd bhuvigyan-backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt || true
      - name: Run unit tests
        run: cd bhuvigyan-backend && pytest tests/unit/ -v --cov=app --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./bhuvigyan-backend/coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bhuvigyan_test
          POSTGRES_USER: bhuvigyan
          POSTGRES_PASSWORD: bhuvigyan123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        ports: ["9092:9092"]
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd bhuvigyan-backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt || true
      - name: Run migrations
        run: cd bhuvigyan-backend && alembic upgrade head || true
      - name: Run integration tests
        run: cd bhuvigyan-backend && pytest tests/integration/ -v -m "not external" || true
      - name: Run database tests
        run: cd bhuvigyan-backend && pytest tests/integration/test_claim_flow.py -v || true
      - name: Run Kafka tests
        run: cd bhuvigyan-backend && pytest tests/integration/test_kafka_pipeline.py -v || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend deps
        run: cd frontend/bhuvigyan-ui && npm ci
      - name: Install Playwright
        run: cd frontend/bhuvigyan-ui && npx playwright install --with-deps
      - name: Start backend (Docker Compose)
        run: docker compose -f docker-compose.test.yml up -d --wait || true
      - name: Run E2E tests
        run: cd frontend/bhuvigyan-ui && npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/bhuvigyan-ui/playwright-report/
      - name: Stop services
        run: docker compose -f docker-compose.test.yml down -v || true

  security-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'schedule' || contains(github.ref, 'release')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd bhuvigyan-backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt || true
      - name: Start backend
        run: cd bhuvigyan-backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
      - name: Run security tests
        run: cd bhuvigyan-backend && pytest tests/integration/test_security.py -v || true
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'

  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d --wait || true
      - name: Run k6 mixed workload (2 min smoke)
        uses: grafana/k6-action@v0.3.1
        with:
          filename: bhuvigyan-backend/tests/perf/mixed-workload.js
          flags: --env BASE_URL=http://localhost:8000 --duration 2m
      - name: Run k6 scoring burst
        uses: grafana/k6-action@v0.3.1
        with:
          filename: bhuvigyan-backend/tests/perf/scoring-burst.js
          flags: --env BASE_URL=http://localhost:8000
      - name: Run k6 cache hit test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: bhuvigyan-backend/tests/perf/redis-cache.js
          flags: --env BASE_URL=http://localhost:8000
      - name: Stop services
        run: docker compose -f docker-compose.test.yml down -v || true
