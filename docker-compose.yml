name: bhuvigyan

# ==============================================================
# Bhuvigyan — PMFBY Fraud Detection — Complete Dev Stack
# Start: docker compose up --build -d
# Logs:  docker compose logs -f
# ==============================================================

networks:
  bhuvigyan-net:
    driver: bridge

volumes:
  pg_data:
  cassandra_data:
  redis_data:
  kafka_data:
  zk_data:
  es_data:
  minio_data:

# ── Common environment for ALL Spring Boot services ─────────────────
x-spring-env: &spring-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bhuvigyan
  SPRING_DATASOURCE_USERNAME: bhuvigyan
  SPRING_DATASOURCE_PASSWORD: bhuvigyan123
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: "6379"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_CASSANDRA_CONTACT_POINTS: cassandra
  SPRING_CASSANDRA_PORT: "9042"
  SPRING_CASSANDRA_KEYSPACE_NAME: bhuvigyan_audit
  SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET_EVIDENCE: bhuvigyan-evidence
  MINIO_BUCKET_SATELLITE: bhuvigyan-satellite
  MINIO_BUCKET_PDFS: bhuvigyan-pdfs
  APP_DEV_MODE: "true"
  GEE_ENABLED: "false"
  JWT_SECRET: bhuvigyan-jwt-secret-key-2026-very-long-string-must-be-at-least-64-chars
  JWT_ISSUER: bhuvigyan.gov.in
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"
  KGIS_BASE_URL: https://kgis.ksrsac.in:9000
  PROTEAN_BASE_URL: https://api.risewithprotean.io
  PROTEAN_CLIENT_ID: dev_mock
  PROTEAN_CLIENT_SECRET: dev_mock
  ML_SERVICE_URL: http://ml-service:8000
  FRAUD_THRESHOLD_AUTO_APPROVE: "30"
  FRAUD_THRESHOLD_REVIEW: "60"
  FRAUD_THRESHOLD_CCE: "80"

# ── Common depends_on for most Spring services ──────────────────────
x-spring-depends: &spring-depends
  postgres:  { condition: service_healthy }
  redis:     { condition: service_healthy }
  kafka:     { condition: service_healthy }
  cassandra: { condition: service_healthy }
  minio:     { condition: service_healthy }

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 + PostGIS 3.4
  # ----------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bhuvigyan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bhuvigyan
      POSTGRES_USER: bhuvigyan
      POSTGRES_PASSWORD: bhuvigyan123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhuvigyan -d bhuvigyan"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # Cassandra 4.1 — immutable audit trail
  # ----------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: bhuvigyan-cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: bhuvigyan-audit
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./infra/cassandra/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # Redis 7.2 — cache + Celery broker + rate limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: bhuvigyan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # Zookeeper + Kafka 3.7
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: bhuvigyan-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    volumes:
      - zk_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bhuvigyan-net]

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: bhuvigyan-kafka
    restart: unless-stopped
    depends_on:
      zookeeper: { condition: service_healthy }
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # Elasticsearch 8 — fraud pattern + heatmap search
  # ----------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: bhuvigyan-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ----------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: bhuvigyan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: ap-south-1
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bhuvigyan-net]

  # Create spec-required buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    container_name: bhuvigyan-minio-init
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/bhuvigyan-evidence   || true &&
        mc mb -p local/bhuvigyan-satellite  || true &&
        mc mb -p local/bhuvigyan-pdfs       || true &&
        mc mb -p local/farmer-documents     || true &&
        mc mb -p local/audit-exports        || true &&
        mc anonymous set download local/bhuvigyan-satellite || true &&
        echo "[minio-init] all spec-compliant buckets ready"
    networks: [bhuvigyan-net]

  # ==========================================================
  # NGINX API GATEWAY — single port 8080 for all Angular apps
  # ==========================================================
  gateway:
    image: nginx:1.27-alpine
    container_name: bhuvigyan-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_headers.inc:/etc/nginx/conf.d/proxy_headers.inc:ro
    depends_on:
      - farmer-service
      - admin-service
      - claims-service
      - location-service
      - notification-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [bhuvigyan-net]

  # ==========================================================
  # APPLICATION SERVICES — All 14 Spring Boot services
  # ==========================================================

  farmer-service:
    build:
      context: ./backend
      dockerfile: farmer-service/Dockerfile
    container_name: bhuvigyan-farmer-service
    restart: unless-stopped
    depends_on: *spring-depends
    environment:
      <<: *spring-env
      SERVER_PORT: "8081"
      POSTGRES_DB: bhuvigyan
      POSTGRES_USER: bhuvigyan
      POSTGRES_PASSWORD: bhuvigyan123
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: bhuvigyan_audit
      CASSANDRA_DC: datacenter1
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks: [bhuvigyan-net]

  admin-service:
