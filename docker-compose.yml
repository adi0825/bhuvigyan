  angular-csc:
    build:
      context: ./frontend/csc
      dockerfile: Dockerfile
    container_name: bhuvigyan-angular-csc
    restart: unless-stopped
    ports: ["4202:80"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [bhuvigyan-net]

  angular-inspector:
    build:
      context: ./frontend/inspector
      dockerfile: Dockerfile
    container_name: bhuvigyan-angular-inspector
    restart: unless-stopped
    ports: ["4203:80"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [bhuvigyan-net]

  angular-insurer:
    build:
      context: ./frontend/insurer
      dockerfile: Dockerfile
    container_name: bhuvigyan-angular-insurer
    restart: unless-stopped
    ports: ["4204:80"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [bhuvigyan-net]

  # ----------------------------------------------------------
  # Observability
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bhuvigyan-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [bhuvigyan-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bhuvigyan-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [bhuvigyan-net]
