# ================================================================
# application-local.yml — Claims Service
# Used when running WITHOUT Docker: SPRING_PROFILES_ACTIVE=local
# ================================================================

server:
  port: ${SERVER_PORT:8083}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bhuvigyan?sslmode=disable
    username: bhuvigyan
    password: bhuvigyan123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cassandra:
    contact-points: localhost
    port: 9042
    keyspace-name: bhuvigyan_audit
    local-datacenter: datacenter1
    schema-action: none

app:
  dev-mode: true
  kafka-enabled: false
  cassandra-enabled: false
  minio-enabled: false
  jwt:
    secret: bhuvigyan-local-dev-secret-key-2026-very-long-string-must-be-64-chars
    issuer: bhuvigyan.gov.in
    access-ttl-minutes: 60

bhuvigyan:
  jwt:
    secret: bhuvigyan-local-dev-secret-key-2026-very-long-string-must-be-64-chars
    issuer: bhuvigyan.gov.in
    accessTtlMinutes: 60
  stateRouter:
    url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    in.gov.bhuvigyan: DEBUG
    org.springframework.kafka: ERROR
    org.springframework.cassandra: ERROR
