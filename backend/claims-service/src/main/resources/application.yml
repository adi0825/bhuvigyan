server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: claims-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bhuvigyan}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:bhuvigyan}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:bhuvigyan123}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.time_zone: UTC
      hibernate.jdbc.lob.non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:${REDIS_HOST:redis}}
      port: ${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
      timeout: 5000ms

  cache:
    type: redis
    redis:
      time-to-live: 604800000
      cache-null-values: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: claims-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "in.gov.bhuvigyan.*"

  cassandra:
    contact-points: ${SPRING_CASSANDRA_CONTACT_POINTS:${CASSANDRA_HOST:cassandra}}
    port: ${SPRING_CASSANDRA_PORT:${CASSANDRA_PORT:9042}}
    keyspace-name: ${SPRING_CASSANDRA_KEYSPACE_NAME:${CASSANDRA_KEYSPACE:bhuvigyan_audit}}
    local-datacenter: ${SPRING_CASSANDRA_LOCAL_DATACENTER:${CASSANDRA_DC:datacenter1}}
    schema-action: none

app:
  dev-mode: ${APP_DEV_MODE:true}
  jwt:
    secret: ${JWT_SECRET:bhuvigyan-jwt-secret-key-2026-very-long-string-must-be-at-least-64-chars}
    issuer: ${JWT_ISSUER:bhuvigyan.gov.in}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-evidence: ${MINIO_BUCKET_EVIDENCE:bhuvigyan-evidence}
    bucket-satellite: ${MINIO_BUCKET_SATELLITE:bhuvigyan-satellite}
    bucket-pdfs: ${MINIO_BUCKET_PDFS:bhuvigyan-pdfs}
  kgis:
    base-url: ${KGIS_BASE_URL:https://kgis.ksrsac.in:9000}
    timeout-seconds: 10
  protean:
    base-url: ${PROTEAN_BASE_URL:https://api.risewithprotean.io}
    client-id: ${PROTEAN_CLIENT_ID:dev_mock}
    client-secret: ${PROTEAN_CLIENT_SECRET:dev_mock}
  ml:
    url: ${ML_SERVICE_URL:http://ml-service:8000}
    internal-key: ${ML_SERVICE_INTERNAL_KEY:bhuvigyan-ml-internal-key-2026}
  fraud:
    threshold:
      auto-approve: ${FRAUD_THRESHOLD_AUTO_APPROVE:30}
      review: ${FRAUD_THRESHOLD_REVIEW:60}
      cce: ${FRAUD_THRESHOLD_CCE:80}
  gee:
    enabled: ${GEE_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    in.gov.bhuvigyan: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
    com.datastax: WARN
