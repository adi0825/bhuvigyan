server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: admin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bhuvigyan}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:bhuvigyan}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:bhuvigyan123}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:${REDIS_HOST:redis}}
      port: ${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
      timeout: 5000ms

  cache:
    type: redis
    redis:
      time-to-live: 604800000
      cache-null-values: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: admin-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "in.gov.bhuvigyan.*"

  cassandra:
    contact-points: ${SPRING_CASSANDRA_CONTACT_POINTS:${CASSANDRA_HOST:cassandra}}
    port: ${SPRING_CASSANDRA_PORT:${CASSANDRA_PORT:9042}}
    keyspace-name: ${SPRING_CASSANDRA_KEYSPACE_NAME:${CASSANDRA_KEYSPACE:bhuvigyan_audit}}
    local-datacenter: ${SPRING_CASSANDRA_LOCAL_DATACENTER:${CASSANDRA_DC:datacenter1}}
    schema-action: none

app:
  dev-mode: ${APP_DEV_MODE:true}
  jwt:
    secret: ${JWT_SECRET:bhuvigyan-jwt-secret-key-2026-very-long-string-must-be-at-least-64-chars}
    issuer: ${JWT_ISSUER:bhuvigyan.gov.in}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}

bhuvigyan:
  jwt:
    secret: ${JWT_SECRET:bhuvigyan-jwt-secret-key-2026-very-long-string-must-be-at-least-64-chars}
    issuer: ${JWT_ISSUER:bhuvigyan.gov.in}
    accessTtlMinutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refreshTtlDays: ${JWT_REFRESH_TTL_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    in.gov.bhuvigyan: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
