# ================================================================
# application-local.yml — Location Service
# Used when running WITHOUT Docker: SPRING_PROFILES_ACTIVE=local
# ================================================================

server:
  port: ${SERVER_PORT:8084}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bhuvigyan?sslmode=disable
    username: bhuvigyan
    password: bhuvigyan123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  cache:
    type: redis

app:
  dev-mode: true
  kafka-enabled: false
  cassandra-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    in.gov.bhuvigyan: DEBUG
