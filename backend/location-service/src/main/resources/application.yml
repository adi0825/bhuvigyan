server:
  port: 8084

spring:
  application:
    name: location-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bhuvigyan}
    username: ${POSTGRES_USER:bhuvigyan}
    password: ${POSTGRES_PASSWORD:bhuvigyan}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 604800000   # 7 days in ms (static reference data)
      cache-null-values: false

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  dev-mode: ${DEV_MODE:true}
