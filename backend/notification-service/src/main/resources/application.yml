server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bhuvigyan}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:bhuvigyan}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:bhuvigyan123}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "in.gov.bhuvigyan.*"

app:
  dev-mode: ${APP_DEV_MODE:true}
  jwt:
    secret: ${JWT_SECRET:bhuvigyan-jwt-secret-key-2026-very-long-string-must-be-at-least-64-chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
