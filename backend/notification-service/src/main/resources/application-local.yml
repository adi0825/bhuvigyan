# ================================================================
# application-local.yml — Notification Service
# Used when running WITHOUT Docker: SPRING_PROFILES_ACTIVE=local
# ================================================================

server:
  port: ${SERVER_PORT:8087}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bhuvigyan?sslmode=disable
    username: bhuvigyan
    password: bhuvigyan123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-local-group
      auto-offset-reset: earliest

app:
  dev-mode: true
  kafka-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    in.gov.bhuvigyan: DEBUG
    org.springframework.kafka: ERROR
